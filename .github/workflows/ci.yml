name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          ignore_paths: node_modules

      - name: Check .mjs syntax
        run: |
          find . -path ./node_modules -prune -o -name '*.mjs' -print \
            | xargs -n1 node --check
